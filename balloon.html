<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Balloon Challenge 🎈</title>

    <link rel="stylesheet"
          href="./css/balloon.css">

</head>

<body>

    <!-- Background Glow -->

    <div class="bg-glow"></div>

    <!-- Header -->

    <div class="game-header">

        <h1>
            Pop Balloons🎈 
        </h1>

        <p>
            Pop all balloons to unlock
            the final surprise 💛
        </p>

        <div id="counter">
            0 / 20
        </div>

    </div>

    <!-- Balloon Area -->

    <div id="balloonContainer">

    </div>

    <!-- Celebration Screen -->

    <div id="celebration"
         class="celebration">

        <div class="popper">
            🎉
        </div>

        <h2>
            All Balloons Popped!
        </h2>

        <p>
            Preparing something special...
        </p>

    </div>

    <!-- Loading Screen -->

    <div id="loadingOverlay"
         class="loading-overlay">

        <h2 id="loadingText">

            Unlocking Final Surprise...

        </h2>

        <div class="loading-bar">

            <div id="progress">

            </div>

        </div>

    </div>

    <script src="./js/pages/balloon.js">

    </script>

</body>

</html>
